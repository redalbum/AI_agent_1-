<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
<style><![CDATA[
.dot { animation: bounce 600ms ease-in-out infinite; }
.dot1 { animation-delay: 0ms; }
.dot2 { animation-delay: 150ms; }
.dot3 { animation-delay: 300ms; }
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}
]]></style>
<circle class="dot dot1" cx="14" cy="24" r="5" fill="#000"/>
<circle class="dot dot2" cx="24" cy="24" r="5" fill="#000"/>
<circle class="dot dot3" cx="34" cy="24" r="5" fill="#000"/>
</svg>
